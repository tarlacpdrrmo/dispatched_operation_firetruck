<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firetruck Operations Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8fafc; 
            color: #1e293b; 
            height: 100vh; 
            display: flex;
            overflow: hidden; 
        }
        
        .dashboard-container {
            background: #ffffff;
            padding: 24px 32px;
            width: 100%;
            max-width: 100%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column; 
            flex: 1;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.02);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 16px;
            flex-shrink: 0;
        }
        
        .header-title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title-wrapper svg {
            color: #2563eb;
            background: #eff6ff;
            padding: 8px;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .header-title-wrapper:hover svg {
            transform: rotate(15deg) scale(1.1);
        }

        .header-top h2 { 
            font-size: 1.15rem; 
            font-weight: 800; 
            margin: 0; 
            color: #0f172a; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .record-count {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .record-count:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }
        
        #recordNum {
            font-size: 1.1rem;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .count-pop {
            transform: scale(1.5);
            color: #bfdbfe;
        }

        .filter-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 160px;
        }

        .filter-group label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-input { 
            padding: 12px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 0.8rem; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            font-weight: 600;
            color: #1e293b;
            background-color: #f8fafc;
            transition: all 0.2s ease-out;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        
        .filter-input:hover {
            border-color: #94a3b8;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
        }

        .filter-input:focus { 
            border-color: #3b82f6; 
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15); 
        }

        .btn-reset {
            background-color: #ffffff;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            height: fit-content;
            align-self: flex-end;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-reset:hover {
            border-color: #94a3b8;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .btn-reset:active {
            transform: translateY(1px) scale(0.96);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        
        .btn-reset svg {
            transition: transform 0.4s ease;
        }
        
        .btn-reset:hover svg {
            transform: rotate(-180deg);
        }

        .table-container { 
            width: 100%; 
            overflow: auto; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            flex: 1; 
            min-height: 0; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            /* Enable momentum scrolling on iOS */
            -webkit-overflow-scrolling: touch;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }
        th { 
            background-color: rgba(248, 250, 252, 0.95); 
            color: #475569; 
            font-size: 0.65rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 16px 20px; 
            border-bottom: 2px solid #e2e8f0; 
            position: sticky; 
            top: 0; 
            letter-spacing: 0.5px; 
            z-index: 10;
            backdrop-filter: blur(8px); 
        }
        
        td { 
            padding: 16px 20px; 
            font-size: 0.75rem; 
            color: #334155; 
            border-bottom: 1px solid #f1f5f9; 
            font-weight: 600;
            text-transform: uppercase;
        }

        /* 
         * GPU-ACCELERATED ANIMATION 
         * translate3d forces the browser to use the GPU (Graphics Card) for 60fps rendering
         */
        @keyframes slideInUp {
            0% { opacity: 0; transform: translate3d(0, 15px, 0); }
            100% { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        .animate-row {
            animation: slideInUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
            will-change: transform, opacity; /* Tells the browser to prepare for animation */
        }
        
        /* 
         * OPTIMIZED HOVER STATE
         * Removing translateX on text to prevent layout thrashing and jitter.
         * Using pseudo-elements and background colors for butter-smooth hovers.
         */
        tr {
            transition: background-color 0.15s ease-out;
            position: relative;
        }

        tr::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: #2563eb;
            opacity: 0;
            transition: opacity 0.2s ease-out;
        }

        tr:hover { 
            background-color: #eff6ff; 
        }
        
        tr:hover::before {
            opacity: 1;
        }
        
        tr:hover td:first-child {
            color: #1d4ed8 !important;
        }
        
        /* Reactive Pill Badge */
        .badge-pill {
            background: #f1f5f9; 
            color: #475569; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            display: inline-block;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease-out;
            will-change: transform, background-color;
        }
        
        tr:hover .badge-pill {
            background: #2563eb;
            color: #ffffff;
            border-color: #2563eb;
            transform: scale(1.03);
            box-shadow: 0 4px 10px rgba(37,99,235,0.25);
        }

        .empty-state { 
            text-align: center; 
            padding: 60px 40px; 
            color: #94a3b8; 
            font-weight: 600; 
        }
        
        #loader { 
            text-align: center; 
            padding: 50px; 
            color: #64748b; 
            font-weight: 600; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header-top">
            <div class="header-title-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <h2>FIRETRUCK OPERATIONS</h2>
            </div>
            
            <div class="record-count">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Records Found: 
                <span id="recordNum">0</span>
            </div>
        </div>

        <div class="filter-panel">
            <div class="filter-group" style="flex: 1.5;">
                <label for="searchInput">Search Data</label>
                <input type="text" id="searchInput" class="filter-input" placeholder="Search Control No., Location..." onkeyup="applyFilters()">
            </div>
            <div class="filter-group">
                <label for="yearFilter">Filter by Year</label>
                <select id="yearFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL YEARS</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="monthFilter">Filter by Month</label>
                <select id="monthFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL MONTHS</option>
                </select>
            </div>
            <div class="filter-group" style="flex: 1.5;">
                <label for="assistanceFilter">Assistance Provided</label>
                <select id="assistanceFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL ASSISTANCE TYPES</option>
                </select>
            </div>
            <button onclick="resetFilters()" class="btn-reset">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                Reset
            </button>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Control No.</th>
                        <th>Date</th>
                        <th>Requestor</th>
                        <th>Assistance Provided</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="loader">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                Fetching records securely...
                <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            </div>
        </div>

    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTNh96ex_BnTTjiBRXbxU52DixCKzecQ9qWvpjThTA3nxjjitfbra-vixyzE1rU8mx/exec"; 
        
        let rawTableData = [];

        function cleanAssistanceText(rawText) {
            if (!rawText) return '-';
            let text = String(rawText).toUpperCase().trim();

            if (text.includes("WATER RATIONING")) return "WATER RATIONING";
            if (text.includes("STANDBY")) return "FIRETRUCK ON STANDBY";
            if (text.includes("FIRE SUPPRESSION") || text.includes("FIRE SUPRESSION") || text.includes("GRASS FIRE") || text.includes("STRUCTURAL FIRE")) {
                return "FIRE SUPPRESSION";
            }
            if (text.includes("WATERING OF PLANT")) return "WATERING OF PLANTS";
            if (text.includes("WATER SUPPORT") || text.includes("SUPPLY ASSISTANCE")) return "WATER SUPPORT & SUPPLY";
            if (text.includes("FLUSHING")) return "FLUSHING";
            if (text.includes("DIALYSIS")) return "DIALYSIS CENTER ASSISTANCE";
            
            return text;
        }

        async function fetchFiretruckData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                
                if (data.error || data.length === 0) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty-state">NO RECORDS FOUND.</td></tr>';
                    return;
                }

                rawTableData = data;
                populateDynamicFilters(rawTableData);
                renderTable(rawTableData);
                
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loader').innerHTML = "FAILED TO LOAD DATA. PLEASE CHECK YOUR CONNECTION.";
            }
        }

        function populateDynamicFilters(data) {
            const years = new Set();
            const months = new Set();
            const assistances = new Set();

            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

            data.forEach(row => {
                const dateVal = row['Date'] || row['DATE'] || '';
                const rawAstVal = row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '';
                
                const cleanAst = cleanAssistanceText(rawAstVal);

                if (cleanAst && cleanAst !== '-') {
                    assistances.add(cleanAst);
                }

                if (dateVal && dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        years.add(parsedDate.getFullYear().toString());
                        months.add(monthNames[parsedDate.getMonth()]);
                    }
                }
            });

            const yearSelect = document.getElementById('yearFilter');
            [...years].sort().reverse().forEach(year => {
                yearSelect.add(new Option(year, year));
            });

            const monthSelect = document.getElementById('monthFilter');
            [...months].sort((a, b) => monthNames.indexOf(a) - monthNames.indexOf(b)).forEach(month => {
                monthSelect.add(new Option(month, month));
            });

            const astSelect = document.getElementById('assistanceFilter');
            [...assistances].sort().forEach(ast => {
                astSelect.add(new Option(ast, ast));
            });
        }

        function applyFilters() {
            const searchQuery = document.getElementById('searchInput').value.toUpperCase();
            const yearQuery = document.getElementById('yearFilter').value;
            const monthQuery = document.getElementById('monthFilter').value;
            const astQuery = document.getElementById('assistanceFilter').value;

            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

            const filteredData = rawTableData.filter(row => {
                const dateVal = row['Date'] || row['DATE'] || '';
                const cleanAst = cleanAssistanceText(row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '');
                
                let rowYear = "";
                let rowMonth = "";

                if (dateVal && dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        rowYear = parsedDate.getFullYear().toString();
                        rowMonth = monthNames[parsedDate.getMonth()];
                    }
                }

                const matchesSearch = Object.values(row).some(val => String(val).toUpperCase().includes(searchQuery));
                const matchesYear = (yearQuery === 'all') || (rowYear === yearQuery);
                const matchesMonth = (monthQuery === 'all') || (rowMonth === monthQuery);
                const matchesAst = (astQuery === 'all') || (cleanAst === astQuery);

                return matchesSearch && matchesYear && matchesMonth && matchesAst;
            });

            renderTable(filteredData);
        }

        function updateCounter(number) {
            const numEl = document.getElementById('recordNum');
            numEl.innerText = number;
            
            numEl.classList.remove('count-pop');
            void numEl.offsetWidth; 
            numEl.classList.add('count-pop');
            
            setTimeout(() => {
                numEl.classList.remove('count-pop');
            }, 300);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            updateCounter(data.length);

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><svg width="40" height="40" style="margin-bottom: 10px; opacity: 0.5;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><br>NO MATCHING RECORDS FOUND.</td></tr>';
                return;
            }

            // DocumentFragment is a lightweight container that holds the DOM nodes.
            // Rendering the whole table into the fragment, and then pushing the fragment
            // to the page ONCE drastically improves frame rates (60fps).
            const fragment = document.createDocumentFragment();

            data.forEach((row, index) => {
                const controlNo = String(row['Control No.'] || row['CONTROL NO.'] || '-').toUpperCase();
                
                let dateVal = String(row['Date'] || row['DATE'] || '-');
                if (dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        dateVal = parsedDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
                    }
                }

                const requestor = String(row['Requestor'] || row['REQUESTOR'] || '-').toUpperCase();
                const location = String(row['Location'] || row['LOCATION'] || '-').toUpperCase();
                
                const cleanAst = cleanAssistanceText(row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '-');

                if (controlNo === '-' && dateVal === '-' && requestor === '-') return;

                const tr = document.createElement('tr');
                tr.className = 'animate-row';
                
                // Cap the maximum animation delay so filtering huge lists doesn't take 5 seconds to finish cascading
                const animDelay = Math.min(index * 0.015, 0.4);
                tr.style.animationDelay = `${animDelay}s`;

                tr.innerHTML = `
                    <td style="font-weight: 800; color: #2563eb; position: relative;">${controlNo}</td>
                    <td style="color: #64748b;">${dateVal}</td>
                    <td style="font-weight: 700; color: #0f172a;">${requestor}</td>
                    <td><span class="badge-pill">${cleanAst}</span></td>
                    <td style="color: #475569;">${location}</td>
                `;
                
                fragment.appendChild(tr);
            });
            
            // Single DOM insertion for maximum performance
            tbody.appendChild(fragment);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('yearFilter').value = 'all';
            document.getElementById('monthFilter').value = 'all';
            document.getElementById('assistanceFilter').value = 'all';
            applyFilters();
        }

        window.onload = fetchFiretruckData;
    </script>
</body>
</html>
