<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firetruck Operations Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- UPDATED CSS FOR FULL-SCREEN LAYOUT --- */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; /* Removed the outer margin */
            background-color: #ffffff; 
            color: #1e293b; 
            height: 100vh; /* Force body to take full screen height */
            display: flex;
            overflow: hidden; /* Prevent double scrollbars */
        }
        
        /* Main Container */
        .dashboard-container {
            background: #ffffff;
            padding: 24px;
            width: 100%;
            max-width: 100%; /* Removed 1400px limit to fill side margins */
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* Allows internal elements to stretch */
            flex: 1;
        }

        /* Header & Filters */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
            flex-shrink: 0;
        }
        
        .header-top h2 { 
            font-size: 1.1rem; 
            font-weight: 800; 
            margin: 0; 
            color: #0f172a; 
            border-left: 5px solid #2563eb; 
            padding-left: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .record-count {
            font-size: 0.75rem;
            font-weight: 700;
            color: #2563eb;
            background: #eff6ff;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #bfdbfe;
        }

        .filter-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-input { 
            padding: 10px 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 0.8rem; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            font-weight: 600;
            color: #1e293b;
            background-color: #ffffff;
            transition: all 0.2s ease;
        }
        
        .filter-input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15); 
        }

        .btn-reset {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            height: fit-content;
            align-self: flex-end;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .btn-reset:hover {
            background-color: #e2e8f0;
            color: #0f172a;
        }

        /* Table Styles - Stretches to fill bottom margin */
        .table-container { 
            width: 100%; 
            overflow: auto; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            flex: 1; /* Magic fix: forces the table to stretch to the bottom */
            min-height: 0; /* Required for the scrollbar to work properly with flexbox */
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
        }
        th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-size: 0.65rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 14px 16px; 
            border-bottom: 2px solid #e2e8f0; 
            position: sticky; 
            top: 0; 
            letter-spacing: 0.5px; 
            z-index: 10;
        }
        td { 
            padding: 14px 16px; 
            font-size: 0.75rem; 
            color: #334155; 
            border-bottom: 1px solid #f1f5f9; 
            font-weight: 600;
            text-transform: uppercase;
        }
        tr:hover td { 
            background-color: #f8fafc; 
        }
        .empty-state { 
            text-align: center; 
            padding: 40px; 
            color: #94a3b8; 
            font-weight: 600; 
        }
        
        #loader { 
            text-align: center; 
            padding: 50px; 
            color: #64748b; 
            font-weight: 600; 
            font-size: 0.9rem; 
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header-top">
            <h2>FIRETRUCK OPERATIONS DATA VIEW</h2>
            <div id="recordCount" class="record-count">RECORDS FOUND: 0</div>
        </div>

        <div class="filter-panel">
            <div class="filter-group" style="flex: 1.5;">
                <label for="searchInput">Search Data</label>
                <input type="text" id="searchInput" class="filter-input" placeholder="SEARCH CONTROL NO., LOCATION..." onkeyup="applyFilters()">
            </div>
            <div class="filter-group">
                <label for="yearFilter">Filter by Year</label>
                <select id="yearFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL YEARS</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="monthFilter">Filter by Month</label>
                <select id="monthFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL MONTHS</option>
                </select>
            </div>
            <div class="filter-group" style="flex: 1.5;">
                <label for="assistanceFilter">Assistance Provided</label>
                <select id="assistanceFilter" class="filter-input" onchange="applyFilters()">
                    <option value="all">ALL ASSISTANCE TYPES</option>
                </select>
            </div>
            <button onclick="resetFilters()" class="btn-reset">Reset Filters</button>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Control No.</th>
                        <th>Date</th>
                        <th>Requestor</th>
                        <th>Assistance Provided</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="loader">Fetching records securely from database...</div>
        </div>

    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTNh96ex_BnTTjiBRXbxU52DixCKzecQ9qWvpjThTA3nxjjitfbra-vixyzE1rU8mx/exec"; 
        
        let rawTableData = [];

        function cleanAssistanceText(rawText) {
            if (!rawText) return '-';
            let text = String(rawText).toUpperCase().trim();

            if (text.includes("WATER RATIONING")) return "WATER RATIONING";
            if (text.includes("STANDBY")) return "FIRETRUCK ON STANDBY";
            if (text.includes("FIRE SUPPRESSION") || text.includes("FIRE SUPRESSION") || text.includes("GRASS FIRE") || text.includes("STRUCTURAL FIRE")) {
                return "FIRE SUPPRESSION";
            }
            if (text.includes("WATERING OF PLANT")) return "WATERING OF PLANTS";
            if (text.includes("WATER SUPPORT") || text.includes("SUPPLY ASSISTANCE")) return "WATER SUPPORT & SUPPLY";
            if (text.includes("FLUSHING")) return "FLUSHING";
            if (text.includes("DIALYSIS")) return "DIALYSIS CENTER ASSISTANCE";
            
            return text;
        }

        async function fetchFiretruckData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                
                if (data.error || data.length === 0) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty-state">NO RECORDS FOUND.</td></tr>';
                    return;
                }

                rawTableData = data;
                populateDynamicFilters(rawTableData);
                renderTable(rawTableData);
                
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loader').innerText = "FAILED TO LOAD DATA. PLEASE CHECK YOUR CONNECTION.";
            }
        }

        function populateDynamicFilters(data) {
            const years = new Set();
            const months = new Set();
            const assistances = new Set();

            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

            data.forEach(row => {
                const dateVal = row['Date'] || row['DATE'] || '';
                const rawAstVal = row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '';
                
                const cleanAst = cleanAssistanceText(rawAstVal);

                if (cleanAst && cleanAst !== '-') {
                    assistances.add(cleanAst);
                }

                if (dateVal && dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        years.add(parsedDate.getFullYear().toString());
                        months.add(monthNames[parsedDate.getMonth()]);
                    }
                }
            });

            const yearSelect = document.getElementById('yearFilter');
            [...years].sort().reverse().forEach(year => {
                yearSelect.add(new Option(year, year));
            });

            const monthSelect = document.getElementById('monthFilter');
            [...months].sort((a, b) => monthNames.indexOf(a) - monthNames.indexOf(b)).forEach(month => {
                monthSelect.add(new Option(month, month));
            });

            const astSelect = document.getElementById('assistanceFilter');
            [...assistances].sort().forEach(ast => {
                astSelect.add(new Option(ast, ast));
            });
        }

        function applyFilters() {
            const searchQuery = document.getElementById('searchInput').value.toUpperCase();
            const yearQuery = document.getElementById('yearFilter').value;
            const monthQuery = document.getElementById('monthFilter').value;
            const astQuery = document.getElementById('assistanceFilter').value;

            const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

            const filteredData = rawTableData.filter(row => {
                const dateVal = row['Date'] || row['DATE'] || '';
                const cleanAst = cleanAssistanceText(row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '');
                
                let rowYear = "";
                let rowMonth = "";

                if (dateVal && dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        rowYear = parsedDate.getFullYear().toString();
                        rowMonth = monthNames[parsedDate.getMonth()];
                    }
                }

                const matchesSearch = Object.values(row).some(val => String(val).toUpperCase().includes(searchQuery));
                const matchesYear = (yearQuery === 'all') || (rowYear === yearQuery);
                const matchesMonth = (monthQuery === 'all') || (rowMonth === monthQuery);
                const matchesAst = (astQuery === 'all') || (cleanAst === astQuery);

                return matchesSearch && matchesYear && matchesMonth && matchesAst;
            });

            renderTable(filteredData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            document.getElementById('recordCount').innerText = `RECORDS FOUND: ${data.length}`;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">NO MATCHING RECORDS FOUND.</td></tr>';
                return;
            }

            data.forEach(row => {
                const controlNo = String(row['Control No.'] || row['CONTROL NO.'] || '-').toUpperCase();
                
                let dateVal = String(row['Date'] || row['DATE'] || '-');
                if (dateVal !== '-') {
                    const parsedDate = new Date(dateVal);
                    if (!isNaN(parsedDate.getTime())) {
                        dateVal = parsedDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
                    }
                }

                const requestor = String(row['Requestor'] || row['REQUESTOR'] || '-').toUpperCase();
                const location = String(row['Location'] || row['LOCATION'] || '-').toUpperCase();
                
                const cleanAst = cleanAssistanceText(row['Assistance Provided'] || row['ASSISTANCE PROVIDED'] || '-');

                if (controlNo === '-' && dateVal === '-' && requestor === '-') return;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 800; color: #2563eb;">${controlNo}</td>
                    <td style="color: #475569;">${dateVal}</td>
                    <td style="font-weight: 700; color: #0f172a;">${requestor}</td>
                    <td><span style="background: #e2e8f0; color: #1e293b; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.5px;">${cleanAst}</span></td>
                    <td style="color: #334155;">${location}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('yearFilter').value = 'all';
            document.getElementById('monthFilter').value = 'all';
            document.getElementById('assistanceFilter').value = 'all';
            applyFilters();
        }

        window.onload = fetchFiretruckData;
    </script>
</body>
</html>
